<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-success-subtle border-bottom border-success-subtle">
    <div class="container py-2">
        <a class="navbar-brand fw-bold text-success" href="{% url 'home' %}">Nutriologa María Pérez</a>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge text-bg-success-subtle text-success-emphasis border border-success-subtle">{{ request.user.username }}</span>
            <a href="{% url 'panel_home' %}" class="btn btn-outline-success btn-sm">Mi panel</a>
            <a href="{% url 'home' %}" class="btn btn-outline-success btn-sm">Inicio app</a>
            <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    {% block content %}{% endblock %}
</main>
</body>
</html>
